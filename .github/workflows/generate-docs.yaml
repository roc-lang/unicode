name: Generate docs

on:
  # Run when a release is published
  release:
    types:
      - published

# Do not add permissions here! Configure them at the job level!
permissions: {}

jobs:
  generate-docs:
    name: Generate docs
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      
      - uses: roc-lang/setup-roc@bd311e2fb815a3d2255f7ee14a922f0b736e020b
        with:
          # Note: nightly hashes are not verified because they are updated regularly.
          version: nightly-new-compiler

      - run: roc version

      - name: Generate docs
        run: roc docs package/main.roc
      
      - name: Fix absolute paths
        run: |
          find generated-docs/ -type f -name '*.html' -exec sed -i "s/\(href\|src\)=\"\//\1=\"\/${{ github.event.repository.name }}\//g" {} +
      
      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: generated-docs

      - name: Deploy docs
        uses: actions/deploy-pages@v4
