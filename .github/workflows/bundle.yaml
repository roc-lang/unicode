name: Bundle

on:
  # Run when a release is published
  release:
    types:
      - published

# Do not add permissions here! Configure them at the job level!
permissions: {}

jobs:
  bundle:
    name: Bundle
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      
      - uses: roc-lang/setup-roc@39c354a6a838a0089eea9068a0414f49b62c5c08
        with:
          # Note: nightly hashes are not verified because they are updated regularly.
          version: nightly

      - run: roc version

      - name: Build release bundle
        id: build
        run: |
          pkg_dir="./package"

          bundle_output=$(roc build --bundle .tar.br $pkg_dir/main.roc)

          bundle_path=$(echo "$bundle_output" | grep -o "$pkg_dir/.*\.tar\.br")

          echo "BUNDLE_PATH=$bundle_path" >> $GITHUB_ENV

          echo "Package bundle created at: $bundle_path"

      - name: Upload bundle to release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_URL: ${{ github.event.release.upload_url }}
        run: |
          FILE_NAME=$(basename "$BUNDLE_PATH")
          
          curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$BUNDLE_PATH" \
            "$UPLOAD_URL?name=$FILE_NAME&label=$FILE_NAME"
